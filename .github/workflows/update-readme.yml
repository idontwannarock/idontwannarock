name: Update README feeds

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every day on 00:00 UTC
  workflow_dispatch:

jobs:
  update-readme:
    name: Update README with latest blog posts and YouTube videos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull in Howard Tech Blog posts
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://idontwannarock.github.io/tech_blog/index.xml"
      - name: Pull in videos from idontwannarock channel
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: "YOUTUBE"
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCYBPF7ZjAm1bulS1PPWx0iw"
